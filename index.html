<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Responsive Images Practice</title>
  </head>
  <body>
    <header>
      <h1>Как я использую адаптивные изображения</h1>
      <p>
        Адаптивные изображения помогают загружать более подходящие файлы для
        разных экранов и устройств. Это улучшает производительность и делает
        страницу аккуратнее.
      </p>
    </header>

    <main>
      <section>
        <h2>Пример изображения с srcset</h2>
        <img
          src="./images/html.png"
          alt="Логотип HTML для практики адаптивных изображений"
          srcset="
            ./images/html-small.png   480w,
            ./images/html-medium.png  768w,
            ./images/html-large.png  1200w
          "
          sizes="(max-width: 600px) 100vw, 600px"
        />
      </section>

      <section>
        <h2>Пример изображения через picture</h2>
        <picture>
          <source
            type="image/webp"
            srcset="
              ./images/html-small.webp   480w,
              ./images/html-medium.webp  768w,
              ./images/html-large.webp  1200w
            "
          />
          <img
            src="./images/html-fallback.png"
            alt="Логотип HTML с fallback изображением"
          />
        </picture>
      </section>
    </main>
  </body>
</html>
