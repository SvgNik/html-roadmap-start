<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Форма обратной связи</title>
  </head>
  <body>
    <header>
      <p>Форма обратной связи</p>
    </header>

    <main>
      <section>
        <h1>Форма учебной заявки</h1>
        <p>
          Эта форма нужна для тренировки базовой HTML-разметки форм. Моя задача
          — правильно связать поля, подписи и кнопку отправки.
        </p>
      </section>

      <form action="">
        <label for="name">Имя</label>
        <input
          type="text"
          id="name"
          name="name"
          placeholder="Введите ваше имя"
        />

        <label for="email">email</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="Введите ваш email"
        />

        <label for="password">password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Введите пароль"
        />

        <label for="direction">Направление</label>
        <select name="direction" id="direction" title="Выбор">
          <option value="frontend">Frontend</option>
          <option value="fullstack">Fullstack</option>
          <option value="UI Basics">UI Basics</option>
        </select>

        <label for="learning-background">Что вы уже изучали?</label>
        <textarea
          name="learning-background"
          id="learning-background"
          placeholder="Напишите, что вы уже изучали"
        ></textarea>

        <button type="submit">Отправить заявку</button>
      </form>
    </main>
  </body>
</html>
